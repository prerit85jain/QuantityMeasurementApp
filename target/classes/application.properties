# ============================================================
# UC18 - Spring Security: JWT + OAuth2
# ============================================================
spring.application.name=quantity-measurement-app

# ============================================================
# H2 Database (Development)
# ============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 Console (development only)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# CORS Configuration
# ============================================================
# Comma-separated list of allowed origins. Set ALLOWED_ORIGINS in production.
# Include your Vercel domain here, for example:
#   ALLOWED_ORIGINS=https://your-frontend.vercel.app,https://your-preview.vercel.app
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

# Frontend URL used for OAuth2 success redirects.
# Set FRONTEND_URL to your Vercel production URL in production.
frontend.url=${FRONTEND_URL:http://localhost:3000}

# ============================================================
# JWT Configuration
# ============================================================
# Secret key: must be a Base64-encoded string of at least 256 bits (32 bytes).
# Set JWT_SECRET environment variable in production. Default is insecure for dev only.
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVFRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==}

# Token lifetime in milliseconds:
# Set JWT_EXPIRATION environment variable for production (3600000 = 1 hour recommended).
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# OAuth2 - Google
# ============================================================
# Set environment variables for production:
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, APP_URL (e.g., https://your-railway-app.up.railway.app)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub
# ============================================================
# Set environment variables for production:
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, APP_URL (e.g., https://your-railway-app.up.railway.app)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${APP_URL:http://localhost:8080}/login/oauth2/code/github
