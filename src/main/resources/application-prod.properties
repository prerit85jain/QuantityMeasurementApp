# ============================================================
# PRODUCTION Profile — AWS RDS PostgreSQL
# All sensitive values come from Railway environment variables.
# ============================================================

# ============================================================
# Server — Railway injects PORT automatically
# ============================================================
server.port=${PORT:8080}

# ============================================================
# AWS RDS PostgreSQL DataSource
# Set these in Railway → your service → Variables:
#   DB_HOST      = your-rds-endpoint.rds.amazonaws.com
#   DB_PORT      = 5432
#   DB_NAME      = quantity_measurement_db
#   DB_USERNAME  = your_db_user
#   DB_PASSWORD  = your_db_password
# ============================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ============================================================
# Connection Pool (HikariCP) — tuned for free-tier RDS
# ============================================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ddl-auto=update  → Hibernate creates/updates tables automatically.
# Switch to 'validate' once schema is stable.
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================================
# Disable H2 console in production
# ============================================================
spring.h2.console.enabled=false

# ============================================================
# Logging — quieter in production
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================================
# Swagger — disable in production (optional, comment out to keep)
# ============================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs

# ============================================================
# Actuator — minimal exposure in production
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ============================================================
# Frontend URL — for OAuth2 post-login redirect
# Set FRONTEND_URL in Railway → your frontend Railway URL
# e.g. https://quantitymeasurementapp-frontend-production.up.railway.app
# ============================================================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ============================================================
# CORS — set APP_CORS_ALLOWED_ORIGINS to your frontend Railway URL
# e.g. https://quantitymeasurementapp-frontend-production.up.railway.app
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ============================================================
# JWT — must be set as env var in Railway, never hardcoded
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ============================================================
# OAuth2 - Google (set real values in Railway env vars)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL}/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub (set real values in Railway env vars)
# ============================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${APP_BASE_URL}/login/oauth2/code/github
