# ============================================================
# Production Configuration - MySQL on Railway
# All values come from environment variables set in Render/Railway
# ============================================================

# ============================================================
# MySQL DataSource (Railway provides MYSQL_URL or individual vars)
# ============================================================
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool tuning for Railway's free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Use 'update' so Hibernate creates/alters tables automatically on first deploy.
# Switch to 'validate' once the schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================
# Disable H2 Console in production
# ============================================================
spring.h2.console.enabled=false

# ============================================================
# Server port - Render injects PORT env variable
# ============================================================
server.port=${PORT:8080}

# ============================================================
# Logging (quieter in production)
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ============================================================
# JWT - set JWT_SECRET in Render environment variables
# ============================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ============================================================
# CORS - set APP_CORS_ALLOWED_ORIGINS in Render env vars
# e.g.  https://your-frontend.onrender.com
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ============================================================
# Frontend URL - for OAuth2 redirect after login
# Set APP_FRONTEND_URL in Render env vars to your Render frontend URL
# ============================================================
app.frontend-url=${APP_FRONTEND_URL}

# ============================================================
# OAuth2 - Google (set in Render environment variables)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BACKEND_URL}/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub (set in Render environment variables)
# ============================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${APP_BACKEND_URL}/login/oauth2/code/github
