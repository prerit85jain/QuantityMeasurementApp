# ============================================================
# Application Configuration - Quantity Measurement App UC16
# ============================================================

# Application environment: development | testing | production
app.env=development

# Repository type: cache | database
repository.type=database

# ============================================================
# H2 Database Configuration (Development/Testing)
# ============================================================
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:quantity_measurement_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
db.username=sa
db.password=
db.pool-size=5

# H2 Console (for development debugging)
# Access via: http://localhost:8082
h2.console.enabled=true
h2.console.port=8082

# ============================================================
# MySQL Configuration (commented out - for future use)
# ============================================================
# db.driver=com.mysql.cj.jdbc.Driver
# db.url=jdbc:mysql://localhost:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=password
# db.pool-size=10

# ============================================================
# PostgreSQL Configuration (commented out - for future use)
# ============================================================
# db.driver=org.postgresql.Driver
# db.url=jdbc:postgresql://localhost:5432/quantity_measurement_db
# db.username=postgres
# db.password=password
# db.pool-size=10

# ============================================================
# HikariCP Connection Pool Settings
# ============================================================
db.hikari.maximum-pool-size=10
db.hikari.minimum-idle=2
db.hikari.connection-timeout=30000
db.hikari.idle-timeout=600000
db.hikari.max-lifetime=1800000
db.hikari.pool-name=QuantityMeasurementPool
db.hikari.connection-test-query=SELECT 1

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.file=quantity-measurement.log