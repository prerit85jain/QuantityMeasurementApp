# ============================================================
# UC18 - Spring Security: JWT + OAuth2
# Active profile: set to 'prod' on Railway via SPRING_PROFILES_ACTIVE=prod
# ============================================================
spring.application.name=quantity-measurement-app
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}

# ============================================================
# H2 Database (Development only)
# ============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate (Development)
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 Console (development only)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# Frontend URL — used for OAuth2 post-login redirect
# Override with FRONTEND_URL env var in Railway
# ============================================================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckpXVFRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# OAuth2 - Google
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub
# ============================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/github
