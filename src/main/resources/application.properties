# ============================================================
# Quantity Measurement App - Local Development (H2)
# ============================================================
spring.application.name=quantity-measurement-app

# ============================================================
# H2 In-Memory Database (Local Dev Only)
# ============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Swagger
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================================
# JWT
# ============================================================
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVFRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==
jwt.expiration=86400000

# ============================================================
# CORS (dev: allow localhost frontend)
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ============================================================
# Frontend URL (for OAuth2 redirect)
# ============================================================
app.frontend-url=http://localhost:3000

# ============================================================
# OAuth2 - Google (fill in your credentials)
# ============================================================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub (fill in your credentials)
# ============================================================
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
