# ============================================================
# UC18 - Spring Security: JWT + OAuth2
# ============================================================
spring.application.name=quantity-measurement-app

# ============================================================
# H2 Database (Development)
# ============================================================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 Console (development only)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# JWT Configuration
# ============================================================
# Secret key: must be a Base64-encoded string of at least 256 bits (32 bytes).
# Generate one with: openssl rand -base64 32
# IMPORTANT: Change this value before going to production!
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVFRoYXRJc0F0TGVhc3QyNTZCaXRzTG9uZw==

# Token lifetime in milliseconds:
# 86400000  = 24 hours  (development – convenient)
# 3600000   = 1 hour    (production – more secure)
jwt.expiration=86400000

# ============================================================
# OAuth2 - Google
# ============================================================
# To enable Google login:
#   1. Go to https://console.cloud.google.com/
#   2. Create a project → APIs & Services → Credentials
#   3. Create OAuth 2.0 Client ID (Web application)
#   4. Add Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
#   5. Replace the placeholder values below with your real credentials
#
# Leave as-is (placeholder) to disable Google login during development.
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ============================================================
# OAuth2 - GitHub
# ============================================================
# To enable GitHub login:
#   1. Go to https://github.com/settings/developers
#   2. New OAuth App
#   3. Authorization callback URL: http://localhost:8080/login/oauth2/code/github
#   4. Replace the placeholder values below with your real credentials
#
# Leave as-is (placeholder) to disable GitHub login during development.
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
